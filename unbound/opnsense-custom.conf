# =============================================================================
# OPNsense Custom Unbound Configuration
# =============================================================================
# Drop this file into /var/unbound/etc/ on your OPNsense firewall.
# OPNsense's Unbound plugin will include files from this directory
# automatically when the service starts.
#
# Path on OPNsense: /var/unbound/etc/opnsense-custom.conf
#
# NOTE: OPNsense manages its own unbound.conf. Do NOT replace it.
# This file provides *additional* directives that are merged in.
# =============================================================================

server:
    # --- Performance ----------------------------------------------------------
    # OPNsense defaults are conservative. Increase cache sizes for networks
    # with many clients or IoT devices.
    msg-cache-size: 64m
    rrset-cache-size: 128m
    key-cache-size: 32m
    neg-cache-size: 16m

    # Prefetch popular records before TTL expiry.
    prefetch: yes
    prefetch-key: yes

    # Serve stale cache entries while refreshing in the background.
    serve-expired: yes
    serve-expired-ttl: 86400

    # --- Privacy & Hardening --------------------------------------------------
    hide-identity: yes
    hide-version: yes

    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes

    use-caps-for-id: yes
    qname-minimisation: yes
    minimal-responses: yes

    # --- DNSSEC ---------------------------------------------------------------
    # OPNsense manages the trust anchor at this path.
    auto-trust-anchor-file: "/var/unbound/root.key"
    val-clean-additional: yes
    val-log-level: 1
    aggressive-nsec: yes

    # --- Logging --------------------------------------------------------------
    # Enable query logging for monitoring. Logs go to syslog by default
    # on OPNsense. Set verbosity to 1 for operational logging.
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-time-ascii: yes

    # --- Blocklist ------------------------------------------------------------
    # If using the update-blocklists.sh script, point to the generated file.
    # On OPNsense, place the blocklist at /var/unbound/etc/blocklist.conf
    # include: "/var/unbound/etc/blocklist.conf"

    # --- Private Addresses (rebind protection) --------------------------------
    # Adjust these to match your LAN subnets.
    # PLACEHOLDER: Replace 192.168.1.0/24 with your actual LAN subnet.
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16

# --- DNS-over-TLS Forwarding -------------------------------------------------
# OPNsense can configure this via the GUI (Services > Unbound DNS > General),
# but if you prefer config-file control, uncomment the block below.

