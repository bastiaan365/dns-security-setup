# =============================================================================
# DNSSEC Validation Configuration
# =============================================================================
# DNSSEC ensures that DNS responses have not been tampered with in transit.
# Unbound validates signatures against the DNS root trust anchor, which is
# automatically maintained via RFC 5011 rollover.
#
# If DNSSEC validation fails for a domain, the response is returned as
# SERVFAIL to the client, preventing spoofed answers from being accepted.
# =============================================================================

server:
    # --- Trust Anchor ---------------------------------------------------------
    # The root trust anchor file is managed automatically by unbound-anchor(1).
    # Run `unbound-anchor` before starting Unbound to bootstrap this file.
    # On Debian/Ubuntu: /var/lib/unbound/root.key
    # On RHEL/CentOS:   /etc/unbound/root.key
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # --- Validation Behaviour -------------------------------------------------
    # Enable DNSSEC validation. Responses that fail validation are dropped.
    val-clean-additional: yes

    # Log DNSSEC validation failures for debugging.
    val-log-level: 1

    # Permit DNSSEC validation failures to be cached (avoids repeated upstream
    # queries for broken domains). Negative trust anchor TTL in seconds.
    val-bogus-ttl: 60

    # Do not allow DNSSEC-stripped answers to be accepted. If a domain is
    # signed but the response has no signatures, treat it as bogus.
    # (This is also set in the main config via harden-dnssec-stripped.)

    # --- Root Hints -----------------------------------------------------------
    # Root hints file for iterative resolution. Not strictly needed when
    # forwarding, but useful for fallback and DNSSEC chain validation.
    # Download from: https://www.internic.net/domain/named.root
    # root-hints: "/etc/unbound/root.hints"

    # --- DLV (deprecated) -----------------------------------------------------
    # Domain Lookaside Validation is deprecated since 2017. Do not enable.
    # dlv-anchor-file: ""

    # --- Aggressive NSEC ------------------------------------------------------
    # Use cached NSEC/NSEC3 records to synthesise negative answers, reducing
    # upstream queries and improving NXDOMAIN response times.
    aggressive-nsec: yes
