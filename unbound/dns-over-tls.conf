# =============================================================================
# DNS-over-TLS Upstream Configuration
# =============================================================================
# Forward all queries over TLS (port 853) to privacy-respecting upstream
# resolvers. This ensures no plaintext DNS leaves your network.
#
# Resolvers configured:
#   - Quad9 (9.9.9.9)        : Malware-blocking, DNSSEC-validating, no logging
#   - Cloudflare (1.1.1.1)   : Fast, DNSSEC-validating, privacy-first
#
# Both resolvers support DNS-over-TLS on port 853 and publish their TLS
# certificates under the hostnames listed below.
# =============================================================================

# Force Unbound to use TLS for all upstream communication.
server:
    # Require TLS for forwarding. Without this, Unbound may fall back to
    # plaintext UDP/TCP.
    tls-cert-bundle: "/etc/ssl/certs/ca-certificates.crt"

forward-zone:
    name: "."
    forward-tls-upstream: yes

    # --- Quad9 ----------------------------------------------------------------
    # Primary:   9.9.9.9        (dns.quad9.net)
    # Secondary: 149.112.112.112 (dns.quad9.net)
    # Quad9 blocks known-malicious domains at the resolver level.
    forward-addr: 9.9.9.9@853#dns.quad9.net
    forward-addr: 149.112.112.112@853#dns.quad9.net

    # --- Quad9 IPv6 -----------------------------------------------------------
    forward-addr: 2620:fe::fe@853#dns.quad9.net
    forward-addr: 2620:fe::9@853#dns.quad9.net

    # --- Cloudflare -----------------------------------------------------------
    # Primary:   1.1.1.1        (cloudflare-dns.com)
    # Secondary: 1.0.0.1        (cloudflare-dns.com)
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

    # --- Cloudflare IPv6 ------------------------------------------------------
    forward-addr: 2606:4700:4700::1111@853#cloudflare-dns.com
    forward-addr: 2606:4700:4700::1001@853#cloudflare-dns.com
