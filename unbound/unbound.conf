# =============================================================================
# Unbound Main Configuration
# =============================================================================
# Privacy-first recursive DNS resolver configuration.
# Listens on localhost and serves the local network.
#
# Additional config is split into modular includes:
#   - dns-over-tls.conf   : Upstream TLS forwarders
#   - dnssec.conf          : DNSSEC validation settings
#
# For OPNsense deployments, use opnsense-custom.conf instead of this file.
# =============================================================================

server:
    # --- Interface & Access ---------------------------------------------------
    # Listen only on localhost by default. Change to your LAN IP (e.g.,
    # 192.168.1.1) if serving other devices on the network.
    interface: 127.0.0.1
    interface: ::1
    port: 53

    # Access control: allow queries from private/local ranges only.
    access-control: 127.0.0.0/8 allow
    access-control: ::1/128 allow
    access-control: 10.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 192.168.0.0/16 allow
    access-control: fc00::/7 allow

    # Refuse everything else.
    access-control: 0.0.0.0/0 refuse
    access-control: ::/0 refuse

    # --- General --------------------------------------------------------------
    do-daemonize: no
    username: "unbound"
    directory: "/etc/unbound"
    chroot: ""
    pidfile: "/run/unbound/unbound.pid"

    # Use all available CPUs. Set to 1 on low-power devices.
    num-threads: 2

    # --- Logging --------------------------------------------------------------
    # Verbosity levels: 0 = errors only, 1 = operational, 2 = detailed,
    # 3+ = debug (not recommended for production).
    verbosity: 1
    log-queries: yes
    log-replies: yes
    log-time-ascii: yes
    logfile: "/var/log/unbound/unbound.log"
    use-syslog: no

    # --- Cache Settings -------------------------------------------------------
    # Aggressive caching improves performance and reduces upstream queries.
    msg-cache-size: 64m
    rrset-cache-size: 128m
    key-cache-size: 32m
    neg-cache-size: 16m

    # Cache minimum and maximum TTL (seconds).
    cache-min-ttl: 300
    cache-max-ttl: 86400

    # Prefetch records before they expire to keep cache warm.
    prefetch: yes
    prefetch-key: yes

    # Serve expired cache entries while fetching fresh data.
    serve-expired: yes
    serve-expired-ttl: 86400

    # --- Performance Tuning ---------------------------------------------------
    # Increase buffer sizes for busy networks.
    so-rcvbuf: 4m
    so-sndbuf: 4m
    msg-buffer-size: 65552
    outgoing-range: 8192
    num-queries-per-thread: 4096

    # Slabs should be a power of 2 close to num-threads.
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4

    # --- Privacy & Security ---------------------------------------------------
    # Hide server identity and version from queries.
    hide-identity: yes
    hide-version: yes
    identity: "dns"
    version: "0"

    # Harden against known DNS attacks.
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-below-nxdomain: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes
    harden-large-queries: yes
    harden-short-bufsize: yes

    # Use 0x20-encoded random bits in the query to foil spoofing.
    use-caps-for-id: yes

    # Minimise data leakage to authoritative servers.
    qname-minimisation: yes
    qname-minimisation-strict: no

    # Minimal responses: only return answer, no extra authority/additional.
    minimal-responses: yes

    # --- Blocklist (local-zone overrides) -------------------------------------
    # Generated blocklist file. Created by blocklists/update-blocklists.sh.
    # Uncomment once the blocklist has been generated.
    # include: "/etc/unbound/blocklist.conf"

    # --- Private Addresses (RFC 1918 rebind protection) -----------------------
    private-address: 10.0.0.0/8
    private-address: 172.16.0.0/12
    private-address: 192.168.0.0/16
    private-address: 169.254.0.0/16
    private-address: fd00::/8
    private-address: fe80::/10

    # --- Modular Includes -----------------------------------------------------
    include: "/etc/unbound/dns-over-tls.conf"
    include: "/etc/unbound/dnssec.conf"
