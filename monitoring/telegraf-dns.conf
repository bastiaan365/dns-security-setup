# =============================================================================
# Telegraf DNS Monitoring Configuration
# =============================================================================
# Collects DNS query metrics from Unbound for visualization in Grafana.
#
# Install: Copy to /etc/telegraf/telegraf.d/dns.conf
# Requires: Telegraf 1.20+, Unbound with logging enabled
# =============================================================================

# --- Unbound Statistics via unbound-control -----------------------------------
# Polls unbound-control for resolver statistics every 30 seconds.
[[inputs.exec]]
  name_override = "unbound_stats"
  commands = ["unbound-control stats_noreset"]
  timeout = "5s"
  interval = "30s"
  data_format = "value"
  data_type = "string"

  # Custom parsing: unbound-control outputs key=value pairs
  # Use the built-in unbound input if available in your Telegraf version.

# --- Native Unbound Input (preferred if available) ----------------------------
# Telegraf has a built-in Unbound input plugin. Use this instead of exec
# if your version supports it.
# [[inputs.unbound]]
#   server = "127.0.0.1:8953"
#   timeout = "5s"
#   ## If running with TLS (default for unbound-control):
#   tls_ca = "/etc/unbound/unbound_server.pem"
#   tls_cert = "/etc/unbound/unbound_control.pem"
#   tls_key = "/etc/unbound/unbound_control.key"
#   ## Collect per-thread stats
#   thread_as_tag = true

# --- Tail Unbound Query Log --------------------------------------------------
# Parses the Unbound query log to extract per-query metrics.
# Requires: log-queries: yes in unbound.conf
[[inputs.tail]]
  name_override = "dns_queries"
  files = ["/var/log/unbound/unbound.log"]
  from_beginning = false
  pipe = false
  watch_method = "inotify"

  # Unbound log format (with log-time-ascii: yes):
  # [1617235200] unbound[12345:0] info: 192.168.1.100 example.com. A IN
  grok_patterns = ['%{SYSLOGTIMESTAMP:timestamp} unbound\[%{NUMBER:pid}:%{NUMBER:thread}\] %{WORD:level}: %{IP:client} %{HOSTNAME:query_name}\. %{WORD:query_type} %{WORD:query_class}']
  grok_custom_patterns = ""
  data_format = "grok"

  [inputs.tail.tags]
    source = "unbound"

# --- DNS Query Probes ---------------------------------------------------------
# Actively probes DNS resolution to measure latency and availability.
# Useful for monitoring upstream resolver health.
[[inputs.dns_query]]
  servers = ["127.0.0.1"]
  network = "udp"
  port = 53
  domains = [
    "google.com",
    "cloudflare.com",
    "quad9.net",
    "github.com",
    "example.com",
  ]
  record_type = "A"
  timeout = "5s"
  interval = "60s"

  [inputs.dns_query.tags]
    probe = "local_resolver"

# --- Output to InfluxDB -------------------------------------------------------
# Send all DNS metrics to InfluxDB for Grafana dashboards.
# PLACEHOLDER: Adjust URL and credentials for your InfluxDB instance.
[[outputs.influxdb_v2]]
  urls = ["http://127.0.0.1:8086"]
  token = "$INFLUX_TOKEN"
  organization = "homelab"
  bucket = "dns_metrics"
  namepass = ["unbound_stats", "dns_queries", "dns_query"]

  [outputs.influxdb_v2.tagpass]
    source = ["unbound"]
